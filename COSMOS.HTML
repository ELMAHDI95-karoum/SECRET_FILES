    .top-bar a {
      color: #000;

      font-weight: bold;

      transition: color 0.3s;
      cursor: pointer;

      color: white;
      border: 1px solid #00d990;

    #videos-container {

      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .video-box {
      background-color: #1e1e1e;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px #00d99055;
      text-align: center;
      width: 120px;
    }

    .video-box h3 {
      color: #00d990;
      margin-bottom: 10px;
      font-size: 18px;
    }

    .video-box video {
      width: 100%;
      border-radius: 10px;
    }

    .video-box a[download] {
      display: inline-block;
      margin-top: 10px;
      background-color: #00d990;
      color: #000;
      padding: 8px 12px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      transition: background-color 0.3s;

      margin-top: 30px;
      padding: 20px;
      background-color: #1e1e1e;
      border-radius: 10px;
      box-shadow: 0 0 10px #00d99055;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }

    .section h2, .sub-section h3 {
      color: #00d990;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    ul li {
      padding: 8px 0;
      border-bottom: 1px solid #444;
    }

    ul li a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    ul li a:hover {

    }

  <!-- ✅ السكربت -->
  <script>
    function showSection(id) {
      document.querySelectorAll('.section').forEach(section => {
        section.style.display = 'none';
      });
      document.querySelectorAll('.sub-section').forEach(sub => {
        sub.style.display = 'none';
      });
      document.getElementById(id).style.display = 'block';
    }

    function showSubSection(id) {
      document.querySelectorAll('.sub-section').forEach(sub => {
        sub.style.display = 'none';
      });
      document.getElementById(id).style.display = 'block';
    }

    function searchVideos() {
      const input = document.getElementById('searchInput').value.toLowerCase();
      const videos = document.querySelectorAll('.video-box');

      videos.forEach(video => {
        const title = video.getAttribute('data-title');
        video.style.display = title.includes(input) ? 'block' : 'none';
      });
    }
  </script>
