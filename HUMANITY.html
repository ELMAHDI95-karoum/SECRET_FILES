  <!-- ✅ السكربت -->
  <script>
    function showSection(id) {
      document.querySelectorAll('.section').forEach(section => {
        section.style.display = 'none';
      });
      document.querySelectorAll('.sub-section').forEach(sub => {
        sub.style.display = 'none';
      });
      document.getElementById(id).style.display = 'block';
    }

    function showSubSection(id) {
      document.querySelectorAll('.sub-section').forEach(sub => {
        sub.style.display = 'none';
      });
      document.getElementById(id).style.display = 'block';
    }

    function searchVideos() {
      const input = document.getElementById('searchInput').value.toLowerCase();
      const videos = document.querySelectorAll('.video-box');

      videos.forEach(video => {
        const title = video.getAttribute('data-title');
        video.style.display = title.includes(input) ? 'block' : 'none';
      });
    }
  </script>
