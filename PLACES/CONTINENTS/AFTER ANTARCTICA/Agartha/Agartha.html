<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>AGARTHA</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #f5f5f5;
      color: #333;
      margin: 0;
      padding: 0;
      display: flex;
    }

    .sidebar {
      width: 250px;
      background-color: #1e1e1e;
      color: white;
      padding: 20px;
      height: 100vh;
      position: fixed;
      overflow-y: auto;
    }

    .sidebar h2 {
      font-size: 18px;
      border-bottom: 1px solid #444;
      padding-bottom: 10px;
      margin-bottom: 15px;
    }

    .sidebar ul {
      list-style: none;
      padding-left: 0;
    }

    .sidebar ul li {
      margin: 10px 0;
    }

    .sidebar ul li a {
      color: #00ffae;
      text-decoration: none;
    }

    .content {
      margin-left: 270px;
      padding: 40px;
      max-width: 1000px;
    }

    h1 {
      text-align: center;
      font-size: 48px;
      color: darkblue;
      margin-bottom: 10px;
    }

    img,
    video {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 30px auto;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
    }

    .source {
      margin-top: 40px;
      font-size: 14px;
      color: #666;
    }

    .controls {
      margin: 30px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .controls label {
      margin-right: 10px;
      font-weight: bold;
    }

    select,
    input[type="color"] {
      padding: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .section-title {
      font-size: 24px;
      margin-top: 60px;
      margin-bottom: 15px;
      color: #004080;
      position: relative;
    }

    .section-title::before {
      content: "";
      position: absolute;
      width: 60px;
      height: 4px;
      background: linear-gradient(to right, #00ffae, #0077ff);
      bottom: -10px;
      left: 0;
      border-radius: 5px;
    }

    .section {
      margin-bottom: 60px;
      padding: 20px;
      background-color: #ffffff;
      border-left: 5px solid #00d990;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      border-radius: 12px;
    }

    .section img {
      float: right;
      margin-left: 20px;
      width: 45%;
      max-width: 300px;
    }

    .clearfix::after {
      content: "";
      display: table;
      clear: both;
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <h2>Contents</h2>
    <ul>
      <li><a href="#intro">Introduction</a></li>
      <li><a href="#literary">Literary</a></li>
      <li><a href="#location">Location</a></li>
      <li><a href="#Research">Research</a></li>
      <li><a href="#references">Sources</a></li>
    </ul>
    <h2>Translate</h2>
    <div id="google_translate_element"></div>
  </div>

  <div class="content">
    <h1 id="intro">THULE</h1>

    <img src="" alt="Map of Agartha">

    <div class="controls">
      <label for="font-select">Font:</label>
      <select id="font-select">
        <option value="Arial">Arial</option>
        <option value="Georgia">Georgia</option>
        <option value="Courier New">Courier New</option>
        <option value="Tahoma">Tahoma</option>
      </select>

      <label for="bg-color">Background:</label>
      <input type="color" id="bg-color" value="#f5f5f5">

      <label for="text-color">Text:</label>
      <input type="color" id="text-color" value="#333333">
    </div>

    <h2 class="section-title">Introduction</h2>
    <div class="section clearfix">
        <p>

        </p>
    </div>    

    <h2 class="section-title" id="references">Sources</h2>
    <div class="section clearfix">
      <div class="source">
        <ul>
          <li><a href="https://en.wikipedia.org/wiki/agharta" target="_blank">Wikipedia – Agartha</a></li>
          <li><a href="https://www.britannica.com/place/agharta" target="_blank">Britannica – Agartha</a></li>
        </ul>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('font-select').addEventListener('change', function () {
      document.body.style.fontFamily = this.value;
    });

    document.getElementById('bg-color').addEventListener('change', function () {
      document.body.style.backgroundColor = this.value;
    });

    document.getElementById('text-color').addEventListener('change', function () {
      document.querySelector('.content').style.color = this.value;
    });
  </script>

  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({ pageLanguage: 'en' }, 'google_translate_element');
    }
  </script>
  <script type="text/javascript"
    src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>

</html>
